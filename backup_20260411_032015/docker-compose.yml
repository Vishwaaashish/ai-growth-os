version: "3.8"

services:

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    
  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"

  worker:
    image: python:3.12
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install redis && python worker.py"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis


networks:
  monitoring:
    driver: bridge
