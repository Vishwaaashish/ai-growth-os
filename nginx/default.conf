server {
    listen 80;

    location /erp/ {
        rewrite ^/erp/(.*)$ /$1 break;
        proxy_pass http://odoo:8069/;
    }

    location /automation/ {
        rewrite ^/automation/(.*)$ /$1 break;
        proxy_pass http://n8n:5678/;
    }

    location /analytics/ {
        rewrite ^/analytics/(.*)$ /$1 break;
        proxy_pass http://metabase:3000/;
    }

    location /monitor/ {
        rewrite ^/monitor/(.*)$ /$1 break;
        proxy_pass http://grafana:3000/;
    }
}
