global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1m
  receiver: "webhook_receiver"

receivers:
  - name: "webhook_receiver"
    webhook_configs:
      - url: "http://host.docker.internal:8000/webhook"
        send_resolved: true
