groups:
  - name: ai_growth_alerts
    rules:

      - alert: HighQueueBacklog
        expr: queue_size{queue_name="default"} > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog high"

      - alert: WorkerFailureSpike
        expr: increase(job_failure_total[1m]) > 3
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Job failures increasing"

      - alert: SlowWorker
        expr: rate(worker_execution_time_seconds_sum[1m]) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Worker slowing down"
